<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>StockTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,700;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
:root {
  --cream: #faf7f2;
  --warm-white: #fff9f4;
  --linen: #ede8df;
  --stone: #c9bfb0;
  --bark: #8a7968;
  --espresso: #2d2118;
  --charcoal: #3d3530;
  --terracotta: #c4673a;
  --terracotta-light: #e8896a;
  --sage: #6b8f71;
  --sage-light: #a8c4ab;
  --amber: #d4880e;
  --amber-light: #f0b84a;
  --red-alert: #b83a2a;
  --surface: #ffffff;
  --border: #e2dbd0;
  --shadow: 0 1px 3px rgba(45,33,24,.08), 0 4px 16px rgba(45,33,24,.05);
  --shadow-md: 0 2px 8px rgba(45,33,24,.12), 0 8px 32px rgba(45,33,24,.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--cream);
  color: var(--espresso);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}

/* ── NAV ── */
.app-nav {
  background: var(--espresso);
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 58px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
}
.nav-logo-mark {
  width: 32px; height: 32px;
  background: var(--terracotta);
  display: grid; place-items: center;
  font-family: 'Fraunces', serif;
  font-size: 16px; font-weight: 700;
  color: #fff;
  border-radius: 6px;
}
.nav-logo-text {
  font-family: 'Fraunces', serif;
  font-size: 18px; font-weight: 600;
  color: var(--cream);
  letter-spacing: -.3px;
}
.nav-tabs {
  display: flex; gap: 4px;
}
.nav-tab {
  background: none; border: none;
  color: var(--stone);
  padding: 7px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  border-radius: 6px;
  transition: all .15s;
  display: flex; align-items: center; gap: 6px;
}
.nav-tab.active { background: rgba(255,255,255,.12); color: #fff; }
.nav-tab:hover:not(.active) { color: var(--linen); }
.nav-tab .tab-icon { font-size: 15px; }
@media(max-width:420px) { .nav-tab span.tab-text { display:none; } .nav-tab { padding: 7px 12px; } }

/* ── SYNC BAR ── */
.sync-bar {
  background: var(--linen);
  border-bottom: 1px solid var(--border);
  padding: 7px 16px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--bark);
  gap: 10px;
}
.sync-left { display: flex; align-items: center; gap: 8px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--stone); flex-shrink:0; }
.sync-dot.ok { background: var(--sage); }
.sync-dot.busy { background: var(--amber); animation: pulse .9s infinite; }
.sync-dot.err { background: var(--red-alert); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
.sync-text { font-weight: 500; }
.sync-actions { display: flex; gap: 8px; }
.sync-btn {
  background: none; border: 1px solid var(--border);
  padding: 4px 12px; border-radius: 4px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  color: var(--bark); cursor: pointer;
  transition: all .15s;
}
.sync-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
.sync-btn.primary { background: var(--terracotta); border-color: var(--terracotta); color: #fff; }
.sync-btn.primary:hover { background: var(--terracotta-light); }
.gdrive-icon { width: 14px; height: 14px; vertical-align: -2px; }

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── STOCK TAKE VIEW ── */
.stock-container {
  max-width: 680px; margin: 0 auto;
  padding: 16px;
}

/* Search + filter */
.stock-toolbar {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
}
.search-wrap { flex: 1; min-width: 160px; position: relative; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--bark); pointer-events:none; }
.search-wrap input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px 10px 36px;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  color: var(--espresso); outline: none;
  transition: border .2s;
}
.search-wrap input:focus { border-color: var(--terracotta); }
.cat-filter {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  color: var(--espresso); outline: none; cursor: pointer;
}
.add-item-btn {
  background: var(--terracotta); color: #fff;
  border: none; border-radius: 8px;
  padding: 10px 18px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600; font-size: 14px;
  cursor: pointer; white-space: nowrap;
  transition: background .15s;
  display: flex; align-items: center; gap: 6px;
}
.add-item-btn:hover { background: var(--terracotta-light); }

/* Alert strip */
.alert-strip {
  background: #fff3ee;
  border: 1px solid #f0c4b0;
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 14px;
  font-size: 13px;
  color: var(--terracotta);
  display: none;
}
.alert-strip.show { display: block; }
.alert-strip strong { font-weight: 600; }

/* Category sections */
.cat-section { margin-bottom: 20px; }
.cat-heading {
  font-family: 'Fraunces', serif;
  font-size: 12px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--bark);
  padding: 0 4px 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.cat-count { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 400; color: var(--stone); }

/* Item card */
.item-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 6px;
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow .15s;
}
.item-card:hover { box-shadow: var(--shadow-md); }
.item-card.flag-low { border-left: 3px solid var(--amber); }
.item-card.flag-out { border-left: 3px solid var(--red-alert); }

.item-main {
  display: flex; align-items: center;
  padding: 12px 14px;
  gap: 12px;
  cursor: pointer;
  user-select: none;
}
.item-info { flex: 1; min-width: 0; }
.item-name {
  font-weight: 600; font-size: 15px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.item-meta { font-size: 12px; color: var(--bark); margin-top: 1px; }

.item-controls { display: flex; align-items: center; gap: 0; flex-shrink: 0; }
.qty-btn {
  width: 36px; height: 36px;
  background: var(--linen); border: none;
  border-radius: 8px;
  font-size: 20px; font-weight: 500;
  color: var(--charcoal); cursor: pointer;
  display: grid; place-items: center;
  transition: background .1s;
  -webkit-user-select: none; user-select: none;
}
.qty-btn:active { background: var(--stone); }
.qty-val {
  width: 52px; text-align: center;
  font-family: 'Fraunces', serif;
  font-size: 22px; font-weight: 600;
  color: var(--espresso);
  background: none; border: none;
  outline: none; cursor: text;
  padding: 0 4px;
}
.qty-val.is-low { color: var(--amber); }
.qty-val.is-out { color: var(--red-alert); }

.status-pill {
  font-size: 10px; font-weight: 600;
  letter-spacing: .8px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 20px;
  flex-shrink: 0;
}
.pill-ok { background: #eaf4eb; color: var(--sage); }
.pill-low { background: #fef3dd; color: var(--amber); }
.pill-out { background: #fdecea; color: var(--red-alert); }

/* Item expand (notes / threshold) */
.item-detail {
  border-top: 1px solid var(--border);
  padding: 10px 14px;
  background: var(--warm-white);
  display: none;
  gap: 14px; align-items: center; flex-wrap: wrap;
}
.item-detail.open { display: flex; }
.detail-label { font-size: 11px; color: var(--bark); font-weight: 500; }
.threshold-wrap { display: flex; align-items: center; gap: 6px; }
.threshold-input {
  width: 52px; text-align: center;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 8px;
  font-family: 'Fraunces', serif; font-size: 14px;
  color: var(--espresso); outline: none;
}
.threshold-input:focus { border-color: var(--terracotta); }
.item-note-text { font-size: 12px; color: var(--bark); font-style: italic; }
.detail-actions { display: flex; gap: 8px; margin-left: auto; }
.detail-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 12px;
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  color: var(--bark); cursor: pointer;
  transition: all .15s;
}
.detail-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
.detail-btn.danger:hover { border-color: var(--red-alert); color: var(--red-alert); }

/* Empty state */
.empty {
  text-align: center; padding: 60px 20px; color: var(--stone);
}
.empty-icon { font-size: 44px; margin-bottom: 14px; }
.empty h3 { font-family: 'Fraunces', serif; font-size: 18px; color: var(--bark); margin-bottom: 6px; }
.empty p { font-size: 13px; }

/* ── REPORTS VIEW ── */
.reports-container {
  max-width: 960px; margin: 0 auto;
  padding: 20px 16px;
}
.reports-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
}
.reports-title {
  font-family: 'Fraunces', serif;
  font-size: 24px; font-weight: 600;
  color: var(--espresso);
}
.reports-subtitle { font-size: 13px; color: var(--bark); margin-top: 2px; }
.export-btn {
  background: var(--espresso); color: var(--cream);
  border: none; border-radius: 8px;
  padding: 10px 18px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600; font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; gap: 7px;
  transition: background .15s;
}
.export-btn:hover { background: var(--charcoal); }

/* KPI cards */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px; margin-bottom: 24px;
}
@media(max-width:680px) { .kpi-grid { grid-template-columns: repeat(2,1fr); } }
@media(max-width:380px) { .kpi-grid { grid-template-columns: 1fr 1fr; } }

.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  box-shadow: var(--shadow);
}
.kpi-label {
  font-size: 11px; letter-spacing: 1px;
  text-transform: uppercase; color: var(--bark);
  font-weight: 500; margin-bottom: 8px;
}
.kpi-value {
  font-family: 'Fraunces', serif;
  font-size: 32px; font-weight: 700;
  line-height: 1;
  color: var(--espresso);
}
.kpi-value.amber { color: var(--amber); }
.kpi-value.red { color: var(--red-alert); }
.kpi-value.sage { color: var(--sage); }
.kpi-sub { font-size: 12px; color: var(--stone); margin-top: 4px; }

/* Charts row */
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px; margin-bottom: 24px;
}
@media(max-width:600px) { .charts-row { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  box-shadow: var(--shadow);
}
.chart-title {
  font-family: 'Fraunces', serif;
  font-size: 14px; font-weight: 600;
  color: var(--espresso); margin-bottom: 14px;
}
.chart-wrap { position: relative; height: 200px; }

/* Alert tables */
.report-section { margin-bottom: 24px; }
.section-title {
  font-family: 'Fraunces', serif;
  font-size: 16px; font-weight: 600;
  color: var(--espresso); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-badge {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 20px;
}
.badge-amber { background: #fef3dd; color: var(--amber); }
.badge-red { background: #fdecea; color: var(--red-alert); }

.alert-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.alert-row {
  display: grid;
  grid-template-columns: 1fr 80px 100px 90px;
  gap: 8px; padding: 12px 16px;
  align-items: center;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.alert-row:last-child { border-bottom: none; }
.alert-row.header {
  background: var(--linen);
  font-size: 11px; font-weight: 600;
  letter-spacing: .8px; text-transform: uppercase;
  color: var(--bark);
}
@media(max-width:500px) {
  .alert-row { grid-template-columns: 1fr 60px 70px; }
  .alert-row .col-cat { display: none; }
}
.alert-name { font-weight: 500; }
.alert-qty-low { color: var(--amber); font-weight: 600; font-family:'Fraunces',serif; }
.alert-qty-out { color: var(--red-alert); font-weight: 600; font-family:'Fraunces',serif; }
.no-alerts {
  padding: 24px; text-align: center;
  color: var(--stone); font-size: 13px;
}
.no-alerts span { font-size: 20px; display:block; margin-bottom:6px; }

/* Full item table */
.full-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.full-row {
  display: grid;
  grid-template-columns: 1fr 80px 100px 90px;
  gap: 8px; padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 14px; align-items: center;
}
.full-row:last-child { border-bottom: none; }
.full-row.header {
  background: var(--linen);
  font-size: 11px; font-weight: 600;
  letter-spacing: .8px; text-transform: uppercase;
  color: var(--bark);
}
@media(max-width:500px) { .full-row { grid-template-columns: 1fr 60px 70px; } .full-row .col-cat { display:none; } }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(45,33,24,.5);
  z-index: 300;
  display: none; place-items: center;
  padding: 16px;
}
.modal-overlay.open { display: grid; }
.modal {
  background: var(--surface);
  border-radius: 14px;
  width: 100%; max-width: 460px;
  box-shadow: var(--shadow-md);
  animation: popIn .2s ease;
  max-height: 90vh; overflow-y: auto;
}
@keyframes popIn { from{opacity:0;transform:scale(.96) translateY(12px)} to{opacity:1;transform:none} }
.modal-head {
  padding: 18px 20px 14px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--surface);
}
.modal-head h2 {
  font-family: 'Fraunces', serif;
  font-size: 18px; font-weight: 600;
}
.modal-close {
  background: var(--linen); border: none;
  width: 30px; height: 30px; border-radius: 50%;
  font-size: 16px; cursor: pointer; color: var(--bark);
  display: grid; place-items: center;
}
.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.field label {
  display: block; font-size: 11px;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--bark); font-weight: 600;
  margin-bottom: 6px;
}
.field input, .field textarea, .field select {
  width: 100%; background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 11px 13px;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  color: var(--espresso); outline: none;
  transition: border .2s;
}
.field input:focus, .field textarea:focus { border-color: var(--terracotta); }
.field textarea { resize: vertical; min-height: 72px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-foot {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-end;
  position: sticky; bottom: 0; background: var(--surface);
}
.btn-cancel {
  background: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; color: var(--bark); cursor: pointer;
}
.btn-save {
  background: var(--terracotta); color: #fff;
  border: none; border-radius: 8px; padding: 10px 24px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600; font-size: 14px; cursor: pointer;
  transition: background .15s;
}
.btn-save:hover { background: var(--terracotta-light); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--espresso); color: var(--cream);
  border-radius: 8px; padding: 11px 20px;
  font-size: 13px; font-weight: 500;
  z-index: 500; opacity: 0;
  transition: all .3s; pointer-events: none;
  white-space: nowrap; max-width: calc(100vw - 32px);
  box-shadow: var(--shadow-md);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.warn { background: var(--amber); color: #fff; }
.toast.err { background: var(--red-alert); color: #fff; }

/* ── IMPORT OVERLAY ── */
.import-area {
  border: 2px dashed var(--border);
  border-radius: 10px; padding: 30px 20px;
  text-align: center; color: var(--bark);
  cursor: pointer; transition: border .2s;
}
.import-area:hover { border-color: var(--terracotta); }
</style>
</head>
<body>

<!-- ── NAV ── -->
<nav class="app-nav">
  <div class="nav-logo">
    <div class="nav-logo-mark">S</div>
    <div class="nav-logo-text">StockTrack</div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('stock')" id="tab-stock">
      <span class="tab-icon">📦</span>
      <span class="tab-text">Stock Take</span>
    </button>
    <button class="nav-tab" onclick="switchView('reports')" id="tab-reports">
      <span class="tab-icon">📊</span>
      <span class="tab-text">Reports</span>
    </button>
  </div>
</nav>

<!-- ── SYNC BAR ── -->
<div class="sync-bar">
  <div class="sync-left">
    <div class="sync-dot" id="syncDot"></div>
    <span class="sync-text" id="syncText">Not signed in to Google Drive</span>
  </div>
  <div class="sync-actions" id="syncActions">
    <button class="sync-btn primary" onclick="gSignIn()" id="btnSignIn">
      <svg class="gdrive-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 18L12 7.5L18 18H6Z" fill="#4285F4"/>
        <path d="M3 18H21L15 8H9L3 18Z" fill="none"/>
        <path d="M2.5 17.5L8.5 6.5H15.5L21.5 17.5H2.5Z" fill="none"/>
        <path d="M12 2L22 19H2L12 2Z" fill="none"/>
        <circle cx="12" cy="12" r="10" fill="none"/>
      </svg>
      Connect Google Drive
    </button>
    <button class="sync-btn" onclick="gSignOut()" id="btnSignOut" style="display:none">Switch Account</button>
    <button class="sync-btn" onclick="importFromFile()" title="Import from file">Import</button>
  </div>
</div>

<!-- ── STOCK TAKE VIEW ── -->
<div class="view active" id="view-stock">
  <div class="stock-container">
    <div class="alert-strip" id="alertStrip"></div>
    <div class="stock-toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search items…" oninput="renderStock()">
      </div>
      <select class="cat-filter" id="catFilter" onchange="renderStock()">
        <option value="">All areas</option>
      </select>
      <button class="add-item-btn" onclick="openModal()">
        <span>+</span> Add Item
      </button>
    </div>
    <div id="stockList"></div>
  </div>
</div>

<!-- ── REPORTS VIEW ── -->
<div class="view" id="view-reports">
  <div class="reports-container">
    <div class="reports-header">
      <div>
        <div class="reports-title">Stock Report</div>
        <div class="reports-subtitle" id="reportDate"></div>
      </div>
      <button class="export-btn" onclick="exportCSV()">
        ⬇ Export CSV
      </button>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Total Items</div>

<div class="toast" id="toast"></div>

<!-- hidden file input for import -->
<input type="file" id="fileImport" accept=".json,.csv" style="display:none" onchange="handleImport(event)">

<script>
// ════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════
const LOCAL_KEY = 'stocktrack_v2';
const GDRIVE_FILE = 'stocktrack-data.json';
let items = [];
let editId = null;
let chartStatus = null, chartCat = null;

// Google Drive state
let gapiReady = false;
let gisReady = false;
let tokenClient = null;
let accessToken = null;
let driveFileId = null;
let syncTimer = null;

// ── Persist ──────────────────────────────────────
function saveLocal() {
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(items)); } catch(e) {}
}
function loadLocal() {
  try {
    const d = localStorage.getItem(LOCAL_KEY);
    if (d) items = JSON.parse(d);
  } catch(e) { items = []; }
}

// ════════════════════════════════════════════════
// GOOGLE DRIVE
// ════════════════════════════════════════════════

// !! REPLACE THESE WITH YOUR CREDENTIALS !!
const GOOGLE_CLIENT_ID = '980360392892-8uvh30nrqum460737ifbef02qpceanje.apps.googleusercontent.com'; // from Google Cloud Console
const GOOGLE_API_KEY   = 'AIzaSyCKgcTpRAh3sK6Tx5oKj3UP8JZsnOEsJxU';   // from Google Cloud Console
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';

function loadGoogleScripts() {
  if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID') {
    setSyncStatus('', 'Google Drive not configured — using local storage only');
    return;
  }
  const s1 = document.createElement('script');
  s1.src = 'https://apis.google.com/js/api.js';
  s1.onload = () => gapi.load('client', initGapiClient);
  document.head.appendChild(s1);

  const s2 = document.createElement('script');
  s2.src = 'https://accounts.google.com/gsi/client';
  s2.onload = initGis;
  document.head.appendChild(s2);
}

async function initGapiClient() {
  await gapi.client.init({ apiKey: GOOGLE_API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
  gapiReady = true;
  checkGoogleReady();
}

function initGis() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { setSyncStatus('err', 'Google sign-in failed'); return; }
      accessToken = resp.access_token;
      gapi.client.setToken({ access_token: accessToken });
      driveFileId = null;
      const expiry = Date.now() + 55 * 60 * 1000;
      localStorage.setItem('st_token', accessToken);
      localStorage.setItem('st_expiry', expiry.toString());
      try {
        const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer ' + accessToken } });
        const u = await r.json();
        if (u.email) localStorage.setItem('st_hint', u.email);
      } catch(e) {}
      document.getElementById('btnSignIn').style.display = 'none';
      document.getElementById('btnSignOut').style.display = 'inline-block';
      await syncFromDrive();
    }
  });
  gisReady = true;
  checkGoogleReady();
}

function checkGoogleReady() {
  if (gapiReady && gisReady) {
    const tok = localStorage.getItem('st_token');
    const exp = parseInt(localStorage.getItem('st_expiry') || '0');
    const hint = localStorage.getItem('st_hint') || '';
    if (tok && Date.now() < exp) {
      // Token still valid — reconnect directly, no popup
      accessToken = tok;
      gapi.client.setToken({ access_token: tok });
      document.getElementById('btnSignIn').style.display = 'none';
      document.getElementById('btnSignOut').style.display = 'inline-block';
      setSyncStatus('busy', 'Reconnecting to Google Drive…');
      syncFromDrive();
    } else if (hint) {
      // Token expired — silent refresh attempt
      setSyncStatus('busy', 'Reconnecting to Google Drive…');
      tokenClient.requestAccessToken({ prompt: '', login_hint: hint });
    } else {
      setSyncStatus('', 'Ready — sign in to sync with Google Drive');
    }
  }
}

function gSignIn() {
  if (!tokenClient) {
    showToast('Google Drive not configured yet', 'warn');
    return;
  }
  // Always show account picker so user can choose which Google account
  tokenClient.requestAccessToken({ prompt: 'select_account' });
}

function gSignOut() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null;
  driveFileId = null;
  gapi.client.setToken(null);
  localStorage.removeItem('st_token');
  localStorage.removeItem('st_expiry');
  localStorage.removeItem('st_hint');
  document.getElementById('btnSignIn').style.display = 'inline-flex';
  document.getElementById('btnSignOut').style.display = 'none';
  setSyncStatus('', 'Signed out — connect Google Drive to sync');
  showToast('Signed out — connect a different account');
}

// Find or create the file in Drive appDataFolder
async function getDriveFileId() {
  if (driveFileId) return driveFileId;
  const res = await gapi.client.drive.files.list({
    spaces: 'appDataFolder',
    fields: 'files(id,name)',
    q: `name='${GDRIVE_FILE}'`
  });
  const files = res.result.files;
  if (files && files.length > 0) { driveFileId = files[0].id; return driveFileId; }
  return null;
}

async function syncFromDrive() {
  setSyncStatus('busy', 'Loading from Google Drive…');
  try {
    const fid = await getDriveFileId();
    if (fid) {
      const res = await gapi.client.drive.files.get({ fileId: fid, alt: 'media' });
      items = JSON.parse(res.body);
      saveLocal();
      setSyncStatus('ok', 'Synced with Google Drive');
    } else {
      setSyncStatus('ok', 'Connected — will save on first change');
    }
    renderAll();
  } catch(e) {
    setSyncStatus('err', 'Drive load failed — using local data');
    renderAll();
  }
}

async function saveToDrive() {
  if (!accessToken) { saveLocal(); return; }
  setSyncStatus('busy', 'Saving to Google Drive…');
  saveLocal();
  try {
    const content = JSON.stringify(items, null, 2);
    const blob = new Blob([content], { type: 'application/json' });

    let fid = await getDriveFileId();
    if (fid) {
      // Update
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: content
      });
    } else {
      // Create
      const meta = { name: GDRIVE_FILE, parents: ['appDataFolder'] };
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
      form.append('file', blob);
      const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST',
        headers: { Authorization: `Bearer ${accessToken}` },
        body: form
      });
      const j = await r.json();
      driveFileId = j.id;
    }
    setSyncStatus('ok', 'Saved to Google Drive · ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setSyncStatus('err', 'Drive save failed — saved locally');
  }
}

function debouncedSave() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(saveToDrive, 800);
}

function setSyncStatus(state, text) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state ? ' ' + state : '');
  document.getElementById('syncText').textContent = text;
}

// ════════════════════════════════════════════════
// IMPORT / EXPORT
// ════════════════════════════════════════════════
function importFromFile() { document.getElementById('fileImport').click(); }

function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      if (file.name.endsWith('.json')) {
        items = JSON.parse(ev.target.result);
      } else {
        // CSV import
        const lines = ev.target.result.trim().split('\n');
        const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
        items = lines.slice(1).map(line => {
          const vals = line.split(',').map(v => v.trim().replace(/"/g,''));
          const obj = {};
          headers.forEach((h,i) => obj[h] = vals[i] || '');
          return {
            id: obj.id || uid(),
            name: obj.name || '',
            qty: parseInt(obj.qty) || 0,
            unit: obj.unit || '',
            category: obj.category || '',
            lowThreshold: parseInt(obj.lowThreshold) || 5,
            notes: obj.notes || ''
          };
        }).filter(i => i.name);
      }
      debouncedSave();
      renderAll();
      showToast(`Imported ${items.length} items`);
    } catch(err) { showToast('Import failed — invalid file', 'err'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function exportCSV() {
  if (!items.length) { showToast('No items to export', 'warn'); return; }
  const headers = ['id','name','qty','unit','category','lowThreshold','notes'];
  const rows = items.map(i => headers.map(h => `"${(i[h]||'').toString().replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = `stocktrack-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('CSV exported');
}

// ════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getStatus(item) {
  if (item.qty === 0) return 'out';
  if (item.qty <= (item.lowThreshold ?? 5)) return 'low';
  return 'ok';
}
function statusPill(s) {
  if (s==='out') return '<span class="status-pill pill-out">Out</span>';
  if (s==='low') return '<span class="status-pill pill-low">Low</span>';
  return '<span class="status-pill pill-ok">OK</span>';
}

// ════════════════════════════════════════════════
// VIEWS
// ════════════════════════════════════════════════
function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('tab-' + v).classList.add('active');
  if (v === 'reports') renderReports();
}

// ════════════════════════════════════════════════
// STOCK TAKE RENDER
// ════════════════════════════════════════════════
function renderAll() { renderStock(); }

function renderStock() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cf = document.getElementById('catFilter').value;

  // Update category filter
  const cats = [...new Set(items.map(i=>i.category).filter(Boolean))].sort();
  const catSel = document.getElementById('catFilter');
  const cv = catSel.value;
  catSel.innerHTML = '<option value="">All areas</option>' + cats.map(c=>`<option value="${c}"${c===cv?' selected':''}>${esc(c)}</option>`).join('');
  document.getElementById('catDatalist').innerHTML = cats.map(c=>`<option value="${esc(c)}">`).join('');

  let filtered = items.filter(i =>
    (!q || i.name.toLowerCase().includes(q) || (i.notes||'').toLowerCase().includes(q)) &&
    (!cf || i.category === cf)
  );

  // Alert strip
  const alertEl = document.getElementById('alertStrip');
  const outCount = filtered.filter(i=>getStatus(i)==='out').length;
  const lowCount = filtered.filter(i=>getStatus(i)==='low').length;
  if (outCount || lowCount) {
    alertEl.classList.add('show');
    const parts = [];
    if (outCount) parts.push(`<strong>${outCount} out of stock</strong>`);
    if (lowCount) parts.push(`<strong>${lowCount} running low</strong>`);
    alertEl.innerHTML = '⚠️ ' + parts.join(' · ') + ' — check Reports for details';
  } else { alertEl.classList.remove('show'); }

  const el = document.getElementById('stockList');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">🍽️</div>
      <h3>${items.length ? 'No matching items' : 'Nothing tracked yet'}</h3>
      <p>${items.length ? 'Try a different search or area.' : 'Tap "Add Item" to start tracking your stock.'}</p>
    </div>`;
    return;
  }

  // Group by category
  const grouped = {};
  filtered.sort((a,b)=>a.name.localeCompare(b.name)).forEach(item => {
    const cat = item.category || 'Uncategorised';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(item);
  });

  el.innerHTML = Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).map(([cat, catItems]) => `
    <div class="cat-section">
      <div class="cat-heading">
        ${esc(cat)}
        <span class="cat-count">${catItems.length} item${catItems.length!==1?'s':''}</span>
      </div>
      ${catItems.map(item => {
        const status = getStatus(item);
        return `
        <div class="item-card flag-${status}" id="card-${item.id}">
          <div class="item-main" onclick="toggleDetail('${item.id}')">
            <div class="item-info">
              <div class="item-name">${esc(item.name)}</div>
              <div class="item-meta">${item.unit ? esc(item.unit) : ''}${item.notes ? (item.unit?' · ':'')+esc(item.notes) : ''}</div>
            </div>
            ${statusPill(status)}
            <div class="item-controls" onclick="event.stopPropagation()">
              <button class="qty-btn" ontouchstart="this.style.background='var(--stone)'" ontouchend="this.style.background=''" onclick="adj('${item.id}',-1)">−</button>
              <input class="qty-val is-${status}" id="qtyVal-${item.id}" type="number" min="0" value="${item.qty}" onchange="setQty('${item.id}',this.value)" onclick="this.select()">
              <button class="qty-btn" ontouchstart="this.style.background='var(--stone)'" ontouchend="this.style.background=''" onclick="adj('${item.id}',1)">+</button>
            </div>
          </div>
          <div class="item-detail" id="detail-${item.id}">
            <div class="threshold-wrap">
              <span class="detail-label">Alert when ≤</span>
              <input class="threshold-input" type="number" min="0" value="${item.lowThreshold??5}" onchange="setThreshold('${item.id}',this.value)">
              <span class="detail-label">${esc(item.unit||'units')}</span>
            </div>
            <div class="detail-actions">
              <button class="detail-btn" onclick="openModal('${item.id}')">Edit</button>
              <button class="detail-btn danger" onclick="deleteItem('${item.id}')">Delete</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function toggleDetail(id) {
  document.getElementById('detail-'+id).classList.toggle('open');
}

function adj(id, delta) {
  const item = items.find(i=>i.id===id); if (!item) return;
  item.qty = Math.max(0, item.qty + delta);
  const inp = document.getElementById('qtyVal-'+id);
  if (inp) { inp.value = item.qty; updateCardStatus(id); }
  debouncedSave();
}

function setQty(id, val) {
  const item = items.find(i=>i.id===id); if (!item) return;
  item.qty = Math.max(0, parseInt(val)||0);
  updateCardStatus(id);
  debouncedSave();
}

function setThreshold(id, val) {
  const item = items.find(i=>i.id===id); if (!item) return;
  item.lowThreshold = Math.max(0, parseInt(val)||0);
  updateCardStatus(id);
  debouncedSave();
}

function updateCardStatus(id) {
  const item = items.find(i=>i.id===id); if (!item) return;
  const card = document.getElementById('card-'+id); if (!card) return;
  const status = getStatus(item);
  card.className = 'item-card flag-'+status;
  const qv = document.getElementById('qtyVal-'+id);
  if (qv) { qv.value = item.qty; qv.className = 'qty-val is-'+status; }
  const pill = card.querySelector('.status-pill');
  if (pill) { pill.outerHTML; card.querySelector('.item-main').insertAdjacentHTML('afterbegin', ''); }
  // Re-render pill
  const mainEl = card.querySelector('.item-main');
  const oldPill = mainEl.querySelector('.status-pill');
  if (oldPill) oldPill.outerHTML = statusPill(status);
  // Update alert strip
  renderAlertStrip();
}

function renderAlertStrip() {
  const alertEl = document.getElementById('alertStrip');
  const outCount = items.filter(i=>getStatus(i)==='out').length;
  const lowCount = items.filter(i=>getStatus(i)==='low').length;
  if (outCount || lowCount) {
    alertEl.classList.add('show');
    const parts = [];
    if (outCount) parts.push(`<strong>${outCount} out of stock</strong>`);
    if (lowCount) parts.push(`<strong>${lowCount} running low</strong>`);
    alertEl.innerHTML = '⚠️ ' + parts.join(' · ') + ' — check Reports for details';
  } else { alertEl.classList.remove('show'); }
}

// ════════════════════════════════════════════════
// REPORTS RENDER
// ════════════════════════════════════════════════
function renderReports() {
  document.getElementById('reportDate').textContent =
    'As of ' + new Date().toLocaleDateString('en-GB', {weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const okItems = items.filter(i=>getStatus(i)==='ok');
  const lowItems = items.filter(i=>getStatus(i)==='low');
  const outItems = items.filter(i=>getStatus(i)==='out');

  document.getElementById('kpiTotal').textContent = items.length;
  document.getElementById('kpiOk').textContent = okItems.length;
  document.getElementById('kpiLow').textContent = lowItems.length;
  document.getElementById('kpiOut').textContent = outItems.length;

  document.getElementById('outBadge').textContent = outItems.length;
  document.getElementById('lowBadge').textContent = lowItems.length;

  // Charts
  renderStatusChart(okItems.length, lowItems.length, outItems.length);
  renderCatChart();

  // Alert tables
  renderAlertTable('outTable', outItems, 'out');
  renderAlertTable('lowTable', lowItems, 'low');

  // Full table
  const ft = document.getElementById('fullTable');
  if (!items.length) { ft.innerHTML = '<div class="no-alerts"><span>📦</span>No items yet</div>'; return; }
  const sorted = [...items].sort((a,b)=>a.name.localeCompare(b.name));
  ft.innerHTML = `<div class="full-table">
    <div class="full-row header">
      <span>Item</span><span>Qty</span><span class="col-cat">Area</span><span>Status</span>
    </div>
    ${sorted.map(item => {
      const s = getStatus(item);
      return `<div class="full-row">
        <span style="font-weight:500">${esc(item.name)}${item.unit?`<span style="color:var(--bark);font-weight:400;font-size:12px"> ${esc(item.unit)}</span>`:''}</span>
        <span style="font-family:'Fraunces',serif;font-weight:600;color:${s==='out'?'var(--red-alert)':s==='low'?'var(--amber)':'var(--espresso)'}">${item.qty}</span>
        <span class="col-cat" style="color:var(--bark);font-size:13px">${esc(item.category||'—')}</span>
        <span>${statusPill(s)}</span>
      </div>`;
    }).join('')}
  </div>`;
}

function renderAlertTable(elId, alertItems, type) {
  const el = document.getElementById(elId);
  if (!alertItems.length) {
    el.innerHTML = `<div class="alert-table"><div class="no-alerts"><span>${type==='out'?'✅':'👍'}</span>${type==='out'?'Nothing out of stock':'All items above low threshold'}</div></div>`;
    return;
  }
  el.innerHTML = `<div class="alert-table">
    <div class="alert-row header">
      <span>Item</span><span>Qty</span><span class="col-cat">Area</span><span>Threshold</span>
    </div>
    ${alertItems.sort((a,b)=>a.qty-b.qty).map(item=>`
    <div class="alert-row">
      <span class="alert-name">${esc(item.name)}${item.unit?`<span style="color:var(--bark);font-size:12px"> ${esc(item.unit)}</span>`:''}</span>
      <span class="${type==='out'?'alert-qty-out':'alert-qty-low'}">${item.qty}</span>
      <span class="col-cat" style="color:var(--bark);font-size:13px">${esc(item.category||'—')}</span>
      <span style="color:var(--stone);font-size:13px">≤ ${item.lowThreshold??5}</span>
    </div>`).join('')}
  </div>`;
}

function renderStatusChart(ok, low, out) {
  if (chartStatus) chartStatus.destroy();
  const ctx = document.getElementById('chartStatus').getContext('2d');
  chartStatus = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['In Stock', 'Low Stock', 'Out of Stock'],
      datasets: [{ data: [ok, low, out], backgroundColor: ['#6b8f71','#d4880e','#b83a2a'], borderWidth: 0, hoverOffset: 6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '68%',
      plugins: {
        legend: { position: 'bottom', labels: { font: { family: 'DM Sans', size: 12 }, padding: 16, color: '#3d3530' } }
      }
    }
  });
}

function renderCatChart() {
  if (chartCat) chartCat.destroy();
  const catCounts = {};
  items.forEach(i => { const c = i.category||'Uncategorised'; catCounts[c] = (catCounts[c]||0)+1; });
  const cats = Object.keys(catCounts).sort();
  const ctx = document.getElementById('chartCat').getContext('2d');
  const colors = ['#c4673a','#6b8f71','#d4880e','#8a7968','#b83a2a','#a8c4ab','#f0b84a','#2d2118'];
  chartCat = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: cats,
      datasets: [{ data: cats.map(c=>catCounts[c]), backgroundColor: cats.map((_,i)=>colors[i%colors.length]), borderRadius: 5, borderSkipped: false }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1, font: { family: 'DM Sans' }, color: '#8a7968' }, grid: { color: '#ede8df' } },
        x: { ticks: { font: { family: 'DM Sans', size: 11 }, color: '#8a7968' }, grid: { display: false } }
      }
    }
  });
}

// ════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════
function openModal(id) {
  editId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Edit Item' : 'Add Item';
  if (id) {
    const item = items.find(i=>i.id===id);
    document.getElementById('fName').value = item.name;
    document.getElementById('fQty').value = item.qty;
    document.getElementById('fUnit').value = item.unit||'';
    document.getElementById('fCat').value = item.category||'';
    document.getElementById('fLow').value = item.lowThreshold??5;
    document.getElementById('fNotes').value = item.notes||'';
  } else {
    ['fName','fQty','fUnit','fCat','fNotes'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('fLow').value = 5;
  }
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(), 150);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editId=null; }

function saveItem() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').focus(); showToast('Please enter a name', 'warn'); return; }
  const data = {
    name,
    qty: parseInt(document.getElementById('fQty').value)||0,
    unit: document.getElementById('fUnit').value.trim(),
    category: document.getElementById('fCat').value.trim(),
    lowThreshold: parseInt(document.getElementById('fLow').value)??5,
    notes: document.getElementById('fNotes').value.trim()
  };
  if (editId) {
    const idx = items.findIndex(i=>i.id===editId);
    items[idx] = { ...items[idx], ...data };
    showToast('Item updated');
  } else {
    items.push({ id: uid(), ...data });
    showToast('Item added');
  }
  closeModal();
  renderAll();
  debouncedSave();
}

function deleteItem(id) {
  if (!confirm('Delete this item?')) return;
  items = items.filter(i=>i.id!==id);
  renderAll();
  debouncedSave();
  showToast('Item deleted');
}

// ════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════
let toastTimer;
function showToast(msg, type) {
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' '+type : '') + ' show';
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2800);
}

// ════════════════════════════════════════════════
// EVENTS
// ════════════════════════════════════════════════
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target===document.getElementById('modalOverlay')) closeModal(); });
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if (e.key==='Enter' && document.getElementById('modalOverlay').classList.contains('open')) saveItem();
});

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
loadLocal();
renderAll();
loadGoogleScripts();
</script>
